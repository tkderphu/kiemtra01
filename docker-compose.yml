  staff-service:
    build: ./staff-service
    ports:
      - "8001:8000"
    depends_on:
      mysql-staff:
        condition: service_healthy
    environment:
      DB_HOST: mysql-staff
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: staff_db

  customer-service:
    build: ./customer-service
    ports:
